<div class="bg-wrapper">Profiles</div>

<section class="container inner-page-main-section publications-shell font-montserrat">
    <div class="profile-hero font-montserrat">
        <p class="eyebrow">Profiles</p>
        <h1 class="font-dm-serif-display">My publication and author profiles</h1>
        <p class="hero-description">
            These are the source profiles I keep updated for articles, research, and authored books.
        </p>
    </div>

    <div class="profile-list font-montserrat">
        @for (profile of profiles; track profile.id) {
            <button type="button" class="profile-row" (click)="openProfile(profile.url)">
                <span class="profile-icon" [class.profile-icon--medium]="profile.id === 'medium'" [class.profile-icon--scholar]="profile.id === 'scholar'" [class.profile-icon--researchgate]="profile.id === 'researchgate'" [class.profile-icon--amazon]="profile.id === 'amazon'">
                    <i [class]="profile.iconClass"></i>
                </span>

                <span class="profile-copy">
                    <span class="profile-title">{{ profile.title }}</span>
                    <span class="profile-description">{{ profile.description }}</span>
                </span>

                <span class="profile-action">
                    Open profile
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>
                </span>
            </button>
        }
    </div>
</section>
